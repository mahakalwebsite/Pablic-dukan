<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ShopOS — Dukan Chain System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--card:#111120;--border:#1e1e35;
  --gold:#f0a500;--amber:#e06b00;--text:#eee8d5;--muted:#7070a0;
  --ok:#22c55e;--err:#ef4444;--blue:#3b82f6;--purple:#a855f7;--teal:#14b8a6;--wa:#25D366;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}
button{cursor:pointer;font-family:'DM Sans',sans-serif;border:none;outline:none}
input,select,textarea{font-family:'DM Sans',sans-serif;outline:none;border:none}
a{color:var(--gold);text-decoration:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:9px}

/* ══ AUTH SCREEN ══ */
#authScreen{
  min-height:100vh;
  background:radial-gradient(ellipse 120% 60% at 50% 0%,#1a1030,var(--bg) 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;gap:18px;
}

/* TOP LOGO */
.auth-logo{text-align:center}
.auth-logo-icon{font-size:48px;display:block;margin-bottom:6px}
.auth-logo-name{
  font-family:'Syne',sans-serif;font-size:30px;font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--amber));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-1px;
}
.auth-logo-sub{color:var(--muted);font-size:12px;margin-top:3px}

/* PANELS ROW */
.panels-row{display:flex;gap:14px;width:100%;max-width:820px;align-items:flex-start}

/* EACH PANEL */
.panel{background:var(--card);border-radius:18px;padding:22px 20px;flex:1;min-width:0}
.panel-login{border:2px solid #f0a50055}
.panel-reg{border:1px solid var(--border)}

.panel-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.panel-header-icon{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.panel-header-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px}
.panel-header-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* REF BANNER */
.ref-banner{
  background:linear-gradient(135deg,#f0a50018,#a855f718);
  border:1px solid #f0a50040;border-radius:10px;
  padding:10px 12px;margin-bottom:14px;text-align:center;
}
.ref-banner-shop{font-weight:700;color:var(--gold);font-size:14px}
.ref-banner-txt{font-size:11px;color:var(--muted);margin-top:2px}

/* FORM */
.field{margin-bottom:11px}
.field-label{display:block;font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;font-weight:600}
.field-input,.field-select{
  display:block;width:100%;background:#07070e;
  border:1px solid var(--border);border-radius:9px;
  padding:11px 13px;color:var(--text);font-size:14px;
  -webkit-appearance:none;appearance:none;
}
.field-input:focus,.field-select:focus{border-color:var(--gold)}
textarea.field-input{resize:vertical;min-height:70px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 16px;border-radius:9px;font-weight:600;font-size:13px}
.btn:active{opacity:.75}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--amber));color:#000}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-red{background:var(--err);color:#fff}
.btn-green{background:var(--ok);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-purple{background:var(--purple);color:#fff}
.btn-teal{background:var(--teal);color:#fff}
.btn-wa{background:var(--wa);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px}
.btn-xs{padding:4px 8px;font-size:11px;border-radius:6px}
.btn-block{width:100%;padding:13px}
.alert-err{background:#ef444415;color:var(--err);border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:10px}

/* OR DIVIDER */
.or-div{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--muted);font-size:12px}
.or-line{flex:1;height:1px;background:var(--border)}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}

/* ══ MAIN APP ══ */
#appScreen{min-height:100vh;display:flex;flex-direction:column}
.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hname{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--gold)}
.hsub{font-size:11px;color:var(--muted)}
.app-nav{background:var(--card);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;gap:5px;overflow-x:auto}
.app-nav::-webkit-scrollbar{height:0}
.nav-btn{padding:7px 13px;border-radius:8px;font-weight:600;font-size:12px;color:var(--muted);background:transparent;border:1px solid transparent;white-space:nowrap;flex-shrink:0}
.nav-btn.active{background:linear-gradient(135deg,var(--gold),var(--amber));color:#000}
.app-content{flex:1;padding:16px;overflow-y:auto}

/* ══ CARD ══ */
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:15px;margin-bottom:12px}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:12px}
.stat-box{border-radius:12px;padding:14px;text-align:center}
.stat-num{font-family:'Syne',sans-serif;font-size:22px;font-weight:900}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.list-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);gap:8px}
.list-row:last-child{border-bottom:none}
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.flex-between{display:flex;align-items:center;justify-content:space-between;gap:8px}

/* SHARE */
.share-card{background:linear-gradient(135deg,#1a1030,#0f1a30);border:1px solid #f0a50033;border-radius:16px;padding:18px;margin-bottom:14px}
.share-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:900;color:var(--gold);margin-bottom:4px}
.share-msg-preview{background:#07070e;border:1px solid var(--border);border-radius:10px;padding:12px;margin:12px 0;font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-all}
.share-btns{display:flex;gap:8px;flex-wrap:wrap}

/* CHAIN TREE */
.tree-node-inner{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.tree-children{margin-left:22px;border-left:2px solid var(--border);padding-left:12px}

/* OTHER */
.prod-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px}
.prod-price{font-family:'Syne',sans-serif;font-size:20px;font-weight:900;color:var(--gold)}
.staff-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;text-align:center}
.oc{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:9px}
.empty{text-align:center;padding:36px 20px;color:var(--muted)}
.empty-icon{font-size:38px;display:block;margin-bottom:8px}
.search-box{background:#07070e;border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;width:100%;max-width:220px;-webkit-appearance:none}
.search-box:focus{border-color:var(--gold)}
.sus-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:12px;text-align:center}
.chat-area{background:#07070e;border:1px solid var(--border);border-radius:11px;padding:12px;min-height:240px;max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:11px}
.msg{display:flex}.msg.me{justify-content:flex-end}
.bubble{max-width:80%;padding:10px 13px;border-radius:16px;line-height:1.55;font-size:13px;white-space:pre-wrap}
.msg.ai .bubble{background:#1a1a2e;border:1px solid var(--border);border-radius:16px 16px 16px 3px}
.msg.me .bubble{background:linear-gradient(135deg,var(--gold),var(--amber));color:#000;font-weight:500;border-radius:16px 16px 3px 16px}
.chat-inp{display:flex;gap:7px}
.chat-inp input{flex:1;background:#07070e;border:1px solid var(--border);border-radius:9px;padding:11px 12px;color:var(--text);font-size:13px;-webkit-appearance:none}
.chat-inp input:focus{border-color:var(--gold)}
.key-box{background:#07070e;border:2px dashed var(--border);border-radius:12px;padding:18px;text-align:center;margin-bottom:12px}

#toast-msg{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:all .28s;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap;max-width:90vw}
#toast-msg.show{transform:translateX(-50%) translateY(0);opacity:1}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:15px}

@media(max-width:600px){
  .panels-row{flex-direction:column}
  .g4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr}
  .g2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="toast-msg"></div>

<!-- ══════════════ AUTH SCREEN ══════════════ -->
<div id="authScreen">

  <!-- LOGO TOP -->
  <div class="auth-logo">
    <span class="auth-logo-icon">🏪</span>
    <div class="auth-logo-name">ShopOS</div>
    <div class="auth-logo-sub">Dukan se Dukan — Chain System</div>
  </div>

  <!-- REF BANNER (shows when ?ref= in URL) -->
  <div class="ref-banner" id="refBanner" style="display:none;width:100%;max-width:820px">
    <div style="font-size:12px;color:var(--muted);margin-bottom:3px">🔗 Aapko invite kiya hai</div>
    <div class="ref-banner-shop" id="refBannerName">—</div>
    <div class="ref-banner-txt">Unki chain mein join karo aur badhao business 📈</div>
  </div>

  <!-- TWO PANELS -->
  <div class="panels-row">

    <!-- ══ LEFT: LOGIN PANEL ══ -->
    <div class="panel panel-login">
      <div class="panel-header">
        <div class="panel-header-icon" style="background:#f0a50022">🔑</div>
        <div>
          <div class="panel-header-title">Login Karo</div>
          <div class="panel-header-sub">Pehle se account hai? Yahan aao</div>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Username</label>
        <input class="field-input" type="text" id="LU" placeholder="apna username daalo" autocomplete="username"/>
      </div>
      <div class="field">
        <label class="field-label">Password</label>
        <input class="field-input" type="password" id="LP" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
      </div>
      <div id="LE"></div>
      <button class="btn btn-gold btn-block" onclick="login()">🚀 Login Karo</button>

      <div class="or-div"><div class="or-line"></div><span>Super Admin</span><div class="or-line"></div></div>
      <div style="background:#07070e;border:1px solid var(--border);border-radius:9px;padding:10px 13px;font-size:13px;color:var(--muted);text-align:center">
        Username: <b style="color:var(--gold)">superadmin</b> &nbsp;|&nbsp; Pass: <b style="color:var(--gold)">super@123</b>
      </div>
    </div>

    <!-- ══ RIGHT: REGISTER PANEL ══ -->
    <div class="panel panel-reg">
      <div class="panel-header">
        <div class="panel-header-icon" style="background:#a855f722">🆕</div>
        <div>
          <div class="panel-header-title">Naya Register</div>
          <div class="panel-header-sub">Apni dukan kholo — bilkul free!</div>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Referral Code (agar kisi ne invite kiya ho)</label>
        <input class="field-input" type="text" id="RC" placeholder="e.g. ABC123" style="letter-spacing:2px;text-transform:uppercase" oninput="checkRef()"/>
        <div id="RC_info" style="font-size:12px;margin-top:4px;color:var(--muted)"></div>
      </div>

      <div class="g2">
        <div class="field">
          <label class="field-label">Dukan Naam *</label>
          <input class="field-input" type="text" id="RS" placeholder="Sharma Store"/>
        </div>
        <div class="field">
          <label class="field-label">Malik Naam *</label>
          <input class="field-input" type="text" id="RO" placeholder="Ramesh"/>
        </div>
        <div class="field">
          <label class="field-label">Username *</label>
          <input class="field-input" type="text" id="RU" placeholder="sharma123" autocomplete="username"/>
        </div>
        <div class="field">
          <label class="field-label">Category</label>
          <select class="field-select" id="RCAT">
            <option>General Store</option><option>Grocery</option><option>Clothing</option>
            <option>Electronics</option><option>Pharmacy</option><option>Restaurant</option>
            <option>Hardware</option><option>Stationery</option><option>Jewellery</option><option>Other</option>
          </select>
        </div>
        <div class="field">
          <label class="field-label">Phone</label>
          <input class="field-input" type="tel" id="RPH" placeholder="9876543210"/>
        </div>
        <div class="field">
          <label class="field-label">Email</label>
          <input class="field-input" type="email" id="REM" placeholder="abc@gmail.com"/>
        </div>
        <div class="field">
          <label class="field-label">Password *</label>
          <input class="field-input" type="password" id="RP" placeholder="6+ chars" autocomplete="new-password"/>
        </div>
        <div class="field">
          <label class="field-label">Confirm Pass *</label>
          <input class="field-input" type="password" id="RP2" placeholder="••••••" autocomplete="new-password"/>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Address</label>
        <input class="field-input" type="text" id="RAD" placeholder="Gali No. 5, Bazar..."/>
      </div>
      <div id="RE"></div>
      <button class="btn btn-gold btn-block" onclick="register()">🏪 Dukan Kholo!</button>
    </div>

  </div><!-- /panels-row -->
</div><!-- /authScreen -->

<!-- ══════════════ MAIN APP ══════════════ -->
<div id="appScreen" style="display:none">
  <div class="app-header">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:22px">🏪</span>
      <div>
        <div class="hname" id="HN">ShopOS</div>
        <div class="hsub" id="HS"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="badge" id="HB" style="background:#f0a50020;color:var(--gold);border:1px solid #f0a50040;font-size:11px"></span>
      <button class="btn btn-red btn-sm" onclick="logout()">🚪 Logout</button>
    </div>
  </div>
  <div class="app-nav" id="appNav"></div>
  <div class="app-content" id="appContent"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle"></div>
      <button class="btn btn-ghost btn-sm" onclick="closeMo()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

const DEF_ROLES=['Manager','Employee','Distributor','Agent','Worker','Accountant','Delivery Boy'];
const SUPER={u:'superadmin',p:'super@123'};
let CU=null,CS=null,TAB='dashboard';

// ── TOAST ──
let _tt;
function toast(msg,t){const el=$('toast-msg');el.textContent=msg;el.style.color=t==='err'?'#ef4444':'#22c55e';el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2600)}

// ── MODAL ──
function openMo(tl,html){$('modalTitle').textContent=tl;$('modalBody').innerHTML=html;$('modalBg').classList.add('open')}
function closeMo(){$('modalBg').classList.remove('open')}
$('modalBg').addEventListener('click',e=>{if(e.target===$('modalBg'))closeMo()});

// ── URL REFERRAL ──
function getPageURL(){return window.location.origin+window.location.pathname}
function getRefLink(shop){return getPageURL()+'?ref='+shop.refCode}

// Auto-fill from URL ?ref=
(function(){
  const ref=new URLSearchParams(window.location.search).get('ref');
  if(!ref)return;
  setTimeout(()=>{
    const inp=$('RC');if(inp){inp.value=ref.toUpperCase();checkRef()}
    const rb=$('refBanner');if(rb)rb.style.display='';

})();

function checkRef(){
  const code=($('RC')||{}).value.trim().toUpperCase();
  const info=$('RC_info');if(!info)return;
  if(!code){info.textContent='';return}
  const found=DB.ks('shop:').map(k=>DB.g(k)).filter(Boolean).find(s=>s.refCode===code);
  info.textContent=found?'✅ Dukan mili: '+found.shopName+' ('+found.ownerName+')':'❌ Code sahi nahi hai';

  if(found){const b=$('refBanner'),bn=$('refBannerName');if(b){b.style.display='';if(bn)bn.textContent=found.shopName+' — '+found.ownerName}}
}

function login(){

  if(!u||!p){err.innerHTML='<div class="alert-err">❌ Username aur password daalo!</div>';return}

  }
  err.innerHTML='<div class="alert-err">❌ Galat username ya password!</div>';
}

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--card:#111120;--border:#1e1e35;
  --gold:#f0a500;--amber:#e06b00;--text:#eee8d5;--muted:#7070a0;

.share-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:900;color:var(--gold);margin-bottom:4px}
.share-msg-preview{background:#07070e;border:1px solid var(--border);border-radius:10px;padding:12px;margin:12px 0;font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-all}
.share-btns{display:flex;gap:8px;flex-wrap:wrap}

/* CHAIN TREE */
.tree-node-inner{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.tree-children{margin-left:22px;border-left:2px solid var(--border);padding-left:12px}

/* OTHER */
.prod-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px}
.prod-price{font-family:'Syne',sans-serif;font-size:20px;font-weight:900;color:var(--gold)}
.staff-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;text-align:center}
.oc{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:9px}
.empty{text-align:center;padding:36px 20px;color:var(--muted)}
.empty-icon{font-size:38px;display:block;margin-bottom:8px}
.search-box{background:#07070e;border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;width:100%;max-width:220px;-webkit-appearance:none}
.search-box:focus{border-color:var(--gold)}
.sus-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:12px;text-align:center}
.chat-area{background:#07070e;border:1px solid var(--border);border-radius:11px;padding:12px;min-height:240px;max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:11px}
.msg{display:flex}.msg.me{justify-content:flex-end}
.bubble{max-width:80%;padding:10px 13px;border-radius:16px;line-height:1.55;font-size:13px;white-space:pre-wrap}
.msg.ai .bubble{background:#1a1a2e;border:1px solid var(--border);border-radius:16px 16px 16px 3px}
.msg.me .bubble{background:linear-gradient(135deg,var(--gold),var(--amber));color:#000;font-weight:500;border-radius:16px 16px 3px 16px}
.chat-inp{display:flex;gap:7px}
.chat-inp input{flex:1;background:#07070e;border:1px solid var(--border);border-radius:9px;padding:11px 12px;color:var(--text);font-size:13px;-webkit-appearance:none}
.chat-inp input:focus{border-color:var(--gold)}
.key-box{background:#07070e;border:2px dashed var(--border);border-radius:12px;padding:18px;text-align:center;margin-bottom:12px}

#toast-msg{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:all .28s;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap;max-width:90vw}
#toast-msg.show{transform:translateX(-50%) translateY(0);opacity:1}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:15px}

@media(max-width:600px){
  .panels-row{flex-direction:column}
  .g4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr}
  .g2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="toast-msg"></div>

<!-- ══════════════ AUTH SCREEN ══════════════ -->
<div id="authScreen">

  <!-- LOGO TOP -->
  <div class="auth-logo">
    <span class="auth-logo-icon">🏪</span>
    <div class="auth-logo-name">ShopOS</div>
    <div class="auth-logo-sub">Dukan se Dukan — Chain System</div>
  </div>

  <!-- REF BANNER (shows when ?ref= in URL) -->
  <div class="ref-banner" id="refBanner" style="display:none;width:100%;max-width:820px">
    <div style="font-size:12px;color:var(--muted);margin-bottom:3px">🔗 Aapko invite kiya hai</div>
    <div class="ref-banner-shop" id="refBannerName">—</div>
    <div class="ref-banner-txt">Unki chain mein join karo aur badhao business 📈</div>
  </div>

  <!-- TWO PANELS -->
  <div class="panels-row">

    <!-- ══ LEFT: LOGIN PANEL ══ -->
    <div class="panel panel-login">
      <div class="panel-header">
        <div class="panel-header-icon" style="background:#f0a50022">🔑</div>
        <div>
          <div class="panel-header-title">Login Karo</div>
          <div class="panel-header-sub">Pehle se account hai? Yahan aao</div>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Username</label>
        <input class="field-input" type="text" id="LU" placeholder="apna username daalo" autocomplete="username"/>
      </div>
      <div class="field">
        <label class="field-label">Password</label>
        <input class="field-input" type="password" id="LP" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
      </div>
      <div id="LE"></div>
      <button class="btn btn-gold btn-block" onclick="login()">🚀 Login Karo</button>

      <div class="or-div"><div class="or-line"></div><span>Super Admin</span><div class="or-line"></div></div>
      <div style="background:#07070e;border:1px solid var(--border);border-radius:9px;padding:10px 13px;font-size:13px;color:var(--muted);text-align:center">
        Username: <b style="color:var(--gold)">superadmin</b> &nbsp;|&nbsp; Pass: <b style="color:var(--gold)">super@123</b>
      </div>
    </div>

    <!-- ══ RIGHT: REGISTER PANEL ══ -->
    <div class="panel panel-reg">
      <div class="panel-header">
        <div class="panel-header-icon" style="background:#a855f722">🆕</div>
        <div>
          <div class="panel-header-title">Naya Register</div>
          <div class="panel-header-sub">Apni dukan kholo — bilkul free!</div>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Referral Code (agar kisi ne invite kiya ho)</label>
        <input class="field-input" type="text" id="RC" placeholder="e.g. ABC123" style="letter-spacing:2px;text-transform:uppercase" oninput="checkRef()"/>
        <div id="RC_info" style="font-size:12px;margin-top:4px;color:var(--muted)"></div>
      </div>

      <div class="g2">
        <div class="field">
          <label class="field-label">Dukan Naam *</label>
          <input class="field-input" type="text" id="RS" placeholder="Sharma Store"/>
        </div>
        <div class="field">
          <label class="field-label">Malik Naam *</label>
          <input class="field-input" type="text" id="RO" placeholder="Ramesh"/>
        </div>
        <div class="field">
          <label class="field-label">Username *</label>
          <input class="field-input" type="text" id="RU" placeholder="sharma123" autocomplete="username"/>
        </div>
        <div class="field">
          <label class="field-label">Category</label>
          <select class="field-select" id="RCAT">
            <option>General Store</option><option>Grocery</option><option>Clothing</option>
            <option>Electronics</option><option>Pharmacy</option><option>Restaurant</option>
            <option>Hardware</option><option>Stationery</option><option>Jewellery</option><option>Other</option>
          </select>
        </div>
        <div class="field">
          <label class="field-label">Phone</label>
          <input class="field-input" type="tel" id="RPH" placeholder="9876543210"/>
        </div>
        <div class="field">
          <label class="field-label">Email</label>
          <input class="field-input" type="email" id="REM" placeholder="abc@gmail.com"/>
        </div>
        <div class="field">
          <label class="field-label">Password *</label>
          <input class="field-input" type="password" id="RP" placeholder="6+ chars" autocomplete="new-password"/>
        </div>
        <div class="field">
          <label class="field-label">Confirm Pass *</label>
          <input class="field-input" type="password" id="RP2" placeholder="••••••" autocomplete="new-password"/>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Address</label>
        <input class="field-input" type="text" id="RAD" placeholder="Gali No. 5, Bazar..."/>
      </div>
      <div id="RE"></div>
      <button class="btn btn-gold btn-block" onclick="register()">🏪 Dukan Kholo!</button>
    </div>

  </div><!-- /panels-row -->
</div><!-- /authScreen -->

<!-- ══════════════ MAIN APP ══════════════ -->
<div id="appScreen" style="display:none">
  <div class="app-header">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:22px">🏪</span>
      <div>
        <div class="hname" id="HN">ShopOS</div>
        <div class="hsub" id="HS"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="badge" id="HB" style="background:#f0a50020;color:var(--gold);border:1px solid #f0a50040;font-size:11px"></span>
      <button class="btn btn-red btn-sm" onclick="logout()">🚪 Logout</button>
    </div>
  </div>
  <div class="app-nav" id="appNav"></div>
  <div class="app-content" id="appContent"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle"></div>
      <button class="btn btn-ghost btn-sm" onclick="closeMo()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const uid=()=>Math.random().toString(36).slice(2,9);
const mkCode=()=>Math.random().toString(36).slice(2,8).toUpperCase();
const now=()=>new Date().toLocaleString('en-IN');
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const DB={
  g:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
  s:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  d:k=>localStorage.removeItem(k),
  ks:p=>Object.keys(localStorage).filter(k=>k.startsWith(p))
};
const DEF_ROLES=['Manager','Employee','Distributor','Agent','Worker','Accountant','Delivery Boy'];
const SUPER={u:'superadmin',p:'super@123'};
let CU=null,CS=null,TAB='dashboard';

// ── TOAST ──
let _tt;
function toast(msg,t){const el=$('toast-msg');el.textContent=msg;el.style.color=t==='err'?'#ef4444':'#22c55e';el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2600)}

// ── MODAL ──
function openMo(tl,html){$('modalTitle').textContent=tl;$('modalBody').innerHTML=html;$('modalBg').classList.add('open')}
function closeMo(){$('modalBg').classList.remove('open')}
$('modalBg').addEventListener('click',e=>{if(e.target===$('modalBg'))closeMo()});

// ── URL REFERRAL ──
function getPageURL(){return window.location.origin+window.location.pathname}
function getRefLink(shop){return getPageURL()+'?ref='+shop.refCode}

// Auto-fill from URL ?ref=
(function(){
  const ref=new URLSearchParams(window.location.search).get('ref');
  if(!ref)return;
  setTimeout(()=>{
    const inp=$('RC');if(inp){inp.value=ref.toUpperCase();checkRef()}
    const rb=$('refBanner');if(rb)rb.style.display='';
  },100);
})();

function checkRef(){
  const code=($('RC')||{}).value.trim().toUpperCase();
  const info=$('RC_info');if(!info)return;
  if(!code){info.textContent='';return}
  const found=DB.ks('shop:').map(k=>DB.g(k)).filter(Boolean).find(s=>s.refCode===code);
  info.textContent=found?'✅ Dukan mili: '+found.shopName+' ('+found.ownerName+')':'❌ Code sahi nahi hai';
  info.style.color=found?'#22c55e':'#ef4444';
  if(found){const b=$('refBanner'),bn=$('refBannerName');if(b){b.style.display='';if(bn)bn.textContent=found.shopName+' — '+found.ownerName}}
}

// ── LOGIN ──
function login(){
  const u=$('LU').value.trim(),p=$('LP').value,err=$('LE');
  if(!u||!p){err.innerHTML='<div class="alert-err">❌ Username aur password daalo!</div>';return}
  if(u===SUPER.u&&p===SUPER.p){CU={role:'superadmin',username:u};err.innerHTML='';startApp();return}
  for(const k of DB.ks('shop:')){
    const s=DB.g(k);if(!s)continue;
    if(s.username===u&&s.password===p){CU={...s,role:'owner'};CS=s;err.innerHTML='';startApp();return}
    const m=(s.staff||[]).find(x=>x.username===u&&x.password===p);
    if(m){CU={...m,shopId:s.id,role:'staff'};CS=s;err.innerHTML='';startApp();return}
  }
  err.innerHTML='<div class="alert-err">❌ Galat username ya password!</div>';
}

// ── REGISTER ──
function register(){
  const sn=$('RS').value.trim(),on=$('RO').value.trim(),un=$('RU').value.trim(),pw=$('RP').value,pw2=$('RP2').value,err=$('RE');
  if(!sn||!on||!un||!pw){err.innerHTML='<div class="alert-err">❌ Zaroori (*) fields bharo!</div>';return}
  if(pw!==pw2){err.innerHTML='<div class="alert-err">❌ Password match nahi hua!</div>';return}
  if(pw.length<6){err.innerHTML='<div class="alert-err">❌ Password 6+ characters!</div>';return}
  for(const k of DB.ks('shop:')){const s=DB.g(k);if(s&&s.username===un){err.innerHTML='<div class="alert-err">❌ Username pehle se hai!</div>';return}}
  const rc=($('RC')||{}).value.trim().toUpperCase();
  let parentId=null,level=1;
  if(rc){
    const parent=DB.ks('shop:').map(k=>DB.g(k)).filter(Boolean).find(s=>s.refCode===rc);
    if(!parent){err.innerHTML='<d
