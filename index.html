  <!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ShopOS — Chain + Role System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--card:#111120;--card2:#16162a;--border:#1e1e35;
  --gold:#f0a500;--amber:#e06b00;--text:#eee8d5;--muted:#7070a0;
  --ok:#22c55e;--err:#ef4444;--blue:#3b82f6;--purple:#a855f7;--teal:#14b8a6;--wa:#25D366;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}
button{cursor:pointer;font-family:'DM Sans',sans-serif;border:none;outline:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
input,select,textarea{font-family:'DM Sans',sans-serif;outline:none;border:none;-webkit-tap-highlight-color:transparent}
a{color:var(--gold);text-decoration:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:9px}

/* ═══ AUTH ═══ */
#authScreen{min-height:100vh;background:radial-gradient(ellipse 120% 60% at 50% 0%,#1a1030,var(--bg) 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:18px;position:relative;z-index:1}
.auth-logo{text-align:center}
.logo-name{font-family:'Syne',sans-serif;font-size:30px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{color:var(--muted);font-size:12px;margin-top:3px}
.panels-row{display:flex;gap:14px;width:100%;max-width:840px;align-items:flex-start}
.panel{background:var(--card);border-radius:18px;padding:22px 20px;flex:1;min-width:0}
.panel-login{border:2px solid #f0a50055}
.panel-reg{border:1px solid var(--border)}
.panel-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.ph-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ph-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px}
.ph-sub{font-size:11px;color:var(--muted);margin-top:2px}
.ref-banner{background:linear-gradient(135deg,#f0a50018,#a855f718);border:1px solid #f0a50040;border-radius:10px;padding:10px 12px;margin-bottom:14px;text-align:center}

/* ═══ FORM ═══ */
.field{margin-bottom:11px}
.fl{display:block;font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;font-weight:600}
.fi,.fs{display:block;width:100%;background:#07070e;border:1px solid var(--border);border-radius:9px;padding:11px 13px;color:var(--text);font-size:14px;-webkit-appearance:none;appearance:none}
.fi:focus,.fs:focus{border-color:var(--gold)}
textarea.fi{resize:vertical;min-height:70px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 16px;border-radius:9px;font-weight:600;font-size:13px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.btn:active{opacity:.72;transform:scale(.97)}
.bg{background:linear-gradient(135deg,var(--gold),var(--amber));color:#000}
.bgh{background:transparent;border:1px solid var(--border);color:var(--text)}
.bd{background:var(--err);color:#fff}
.bk{background:var(--ok);color:#fff}
.bb{background:var(--blue);color:#fff}
.bp{background:var(--purple);color:#fff}
.bt{background:var(--teal);color:#fff}
.bwa{background:var(--wa);color:#fff}
.bsm{padding:6px 12px;font-size:12px;border-radius:7px}
.bxs{padding:4px 8px;font-size:11px;border-radius:6px}
.bfw{width:100%;padding:13px}
.ae{background:#ef444415;color:var(--err);border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:10px}
.ak{background:#22c55e15;color:var(--ok);border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:10px}

/* ═══ BADGES ═══ */
.bx{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.role-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}

/* ═══ MAIN APP ═══ */
#appScreen{min-height:100vh;display:flex;flex-direction:column}
.app-hdr{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hn{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--gold)}
.hs{font-size:11px;color:var(--muted)}
.app-nav{background:var(--card);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;gap:5px;overflow-x:auto}
.app-nav::-webkit-scrollbar{height:0}
.nb{padding:7px 13px;border-radius:8px;font-weight:600;font-size:12px;color:var(--muted);background:transparent;border:1px solid transparent;white-space:nowrap;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.nb.on{background:linear-gradient(135deg,var(--gold),var(--amber));color:#000}
.cnt{flex:1;padding:16px;overflow-y:auto}

/* ═══ CARDS ═══ */
.cd{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:15px;margin-bottom:12px}
.cdt{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:12px}
.sb{border-radius:12px;padding:14px;text-align:center}
.sv{font-family:'Syne',sans-serif;font-size:22px;font-weight:900}
.sl{font-size:11px;color:var(--muted);margin-top:2px}
.lr{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);gap:8px}
.lr:last-child{border-bottom:none}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.jb{display:flex;align-items:center;justify-content:space-between;gap:8px}

/* ═══ 3-TIER PRICING ═══ */
.price-tier-box{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.price-tier-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.tier-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.tier-inp-wrap{text-align:center}
.tier-label{font-size:11px;font-weight:700;margin-bottom:5px;display:block}
.tier-inp{display:block;width:100%;background:#07070e;border:2px solid var(--border);border-radius:9px;padding:10px 8px;color:var(--text);font-size:14px;font-weight:700;text-align:center;-webkit-appearance:none;outline:none}
.tier-inp:focus{border-color:var(--gold)}

/* PRICE DISPLAY on product card */
.price-tiers{display:flex;gap:6px;flex-wrap:wrap;margin:5px 0}
.pt{padding:3px 9px;border-radius:7px;font-size:12px;font-weight:700}
.pt-r{background:#f0a50022;color:var(--gold);border:1px solid #f0a50044}
.pt-w{background:#3b82f622;color:#3b82f6;border:1px solid #3b82f644}
.pt-d{background:#a855f722;color:#a855f7;border:1px solid #a855f744}

/* ROLE PERMISSIONS TABLE */
.perm-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.perm-table th,.perm-table td{padding:7px 10px;border:1px solid var(--border);text-align:center}
.perm-table th{background:var(--card2);font-weight:700;font-size:11px;text-transform:uppercase}
.perm-table td:first-child{text-align:left;font-weight:600}

/* MODAL */
.mov{visibility:hidden;pointer-events:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;transition:opacity .2s}
.mov.open{visibility:visible;pointer-events:all;opacity:1}
.mbox{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mt{font-family:'Syne',sans-serif;font-weight:800;font-size:15px}

/* MISC */
.pc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px}
.stc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;text-align:center}
.oc{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px;margin-bottom:9px}
.emp{text-align:center;padding:36px 20px;color:var(--muted)}
.eic{font-size:38px;display:block;margin-bottom:8px}
.sb2{background:#07070e;border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-size:13px;width:100%;max-width:220px;-webkit-appearance:none}
.sb2:focus{border-color:var(--gold)}
.sus{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:12px;text-align:center}
.cb2{background:#07070e;border:1px solid var(--border);border-radius:11px;padding:12px;min-height:240px;max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:11px}
.ms{display:flex}.ms.me{justify-content:flex-end}
.bu{max-width:80%;padding:10px 13px;border-radius:16px;line-height:1.55;font-size:13px;white-space:pre-wrap}
.ms.ai .bu{background:#1a1a2e;border:1px solid var(--border);border-radius:16px 16px 16px 3px}
.ms.me .bu{background:linear-gradient(135deg,var(--gold),var(--amber));color:#000;font-weight:500;border-radius:16px 16px 3px 16px}
.ci{display:flex;gap:7px}
.ci input{flex:1;background:#07070e;border:1px solid var(--border);border-radius:9px;padding:11px 12px;color:var(--text);font-size:13px;-webkit-appearance:none}
.ci input:focus{border-color:var(--gold)}
.share-card{background:linear-gradient(135deg,#1a1030,#0f1a30);border:1px solid #f0a50033;border-radius:16px;padding:18px;margin-bottom:14px}
.msg-prev{background:#07070e;border:1px solid var(--border);border-radius:10px;padding:12px;margin:12px 0;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-all}
.tn{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.tch{margin-left:22px;border-left:2px solid var(--border);padding-left:12px}
.keybox{background:#07070e;border:2px dashed var(--border);border-radius:12px;padding:18px;text-align:center;margin-bottom:12px}

#tst{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:all .28s;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap;max-width:90vw;pointer-events:none}
#tst.on{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:600px){.panels-row{flex-direction:column}.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.tier-row{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>
<div id="tst"></div>

<!-- ═══════════ AUTH ═══════════ -->
<div id="authScreen">
  <div class="auth-logo">
    <div style="font-size:46px">🏪</div>
    <div class="logo-name">ShopOS</div>
    <div class="logo-sub">Chain System · Role-Based Access · 3-Tier Pricing</div>
  </div>

  <div class="ref-banner" id="refBanner" style="display:none;width:100%;max-width:840px">
    <div style="font-size:12px;color:var(--muted);margin-bottom:3px">🔗 Aapko invite kiya hai</div>
    <div style="font-weight:700;color:var(--gold);font-size:14px" id="refBannerName">—</div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px">Unki chain mein join karo aur badhao business 📈</div>
  </div>

  <div class="panels-row">
    <!-- LOGIN PANEL -->
    <div class="panel panel-login">
      <div class="panel-header">
        <div class="ph-icon" style="background:#f0a50022">🔑</div>
        <div><div class="ph-title">Login Karo</div><div class="ph-sub">Pehle se account hai</div></div>
      </div>
      <div class="field"><label class="fl">Username</label><input class="fi" type="text" id="LU" placeholder="username daalo" autocomplete="username"/></div>
      <div class="field"><label class="fl">Password</label><input class="fi" type="password" id="LP" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/></div>
      <div id="LE"></div>
      <button class="btn bg bfw" onclick="login()">🚀 Login Karo</button>
      <div style="margin-top:14px;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 13px">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:6px">Super Admin</div>
        <div style="font-size:13px">User: <b style="color:var(--gold)">superadmin</b> &nbsp;|&nbsp; Pass: <b style="color:var(--gold)">super@123</b></div>
      </div>
    </div>

    <!-- REGISTER PANEL -->
    <div class="panel panel-reg">
      <div class="panel-header">
        <div class="ph-icon" style="background:#a855f722">🆕</div>
        <div><div class="ph-title">Naya Register</div><div class="ph-sub">Apni dukan kholo — free!</div></div>
      </div>
      <div class="field">
        <label class="fl">Referral Code (optional)</label>
        <input class="fi" type="text" id="RC" placeholder="Kisi ka code ho to daalo" style="letter-spacing:2px;text-transform:uppercase" oninput="chkRef()"/>
        <div id="RC_info" style="font-size:12px;margin-top:4px;color:var(--muted)"></div>
      </div>
      <div class="g2">
        <div class="field"><label class="fl">Dukan Naam *</label><input class="fi" type="text" id="RS" placeholder="Sharma Store"/></div>
        <div class="field"><label class="fl">Malik Naam *</label><input class="fi" type="text" id="RO" placeholder="Ramesh"/></div>
        <div class="field"><label class="fl">Username *</label><input class="fi" type="text" id="RU" placeholder="sharma123" autocomplete="username"/></div>
        <div class="field"><label class="fl">Category</label>
          <select class="fs" id="RCAT"><option>General Store</option><option>Grocery</option><option>Clothing</option><option>Electronics</option><option>Pharmacy</option><option>Restaurant</option><option>Hardware</option><option>Other</option></select>
        </div>
        <div class="field"><label class="fl">Phone</label><input class="fi" type="tel" id="RPH" placeholder="9876543210"/></div>
        <div class="field"><label class="fl">Email</label><input class="fi" type="email" id="REM" placeholder="abc@gmail.com"/></div>
        <div class="field"><label class="fl">Password *</label><input class="fi" type="password" id="RP" placeholder="6+ chars" autocomplete="new-password"/></div>
        <div class="field"><label class="fl">Confirm *</label><input class="fi" type="password" id="RP2" placeholder="••••••" autocomplete="new-password"/></div>
      </div>
      <div class="field"><label class="fl">Address</label><input class="fi" type="text" id="RAD" placeholder="Gali No. 5, Bazar..."/></div>
      <div id="RE"></div>
      <button class="btn bg bfw" onclick="register()">🏪 Dukan Kholo!</button>
    </div>
  </div>
</div>

<!-- ═══════════ MAIN APP ═══════════ -->
<div id="appScreen" style="display:none">
  <div class="app-hdr">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:22px">🏪</span>
      <div><div class="hn" id="HN">ShopOS</div><div class="hs" id="HS"></div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="HB"></span>
      <button class="btn bd bsm" onclick="logout()">🚪</button>
    </div>
  </div>
  <div class="app-nav" id="appNav"></div>
  <div class="cnt" id="cnt"></div>
</div>

<!-- MODAL -->
<div class="mov" id="MO">
  <div class="mbox">
    <div class="mhd"><div class="mt" id="MT"></div><button class="btn bgh bsm" onclick="cMo()">✕</button></div>
    <div id="MB"></div>
  </div>
</div>

<script>
// ═══ HELPERS ═══
const $=id=>document.getElementById(id);
const uid=()=>Math.random().toString(36).slice(2,9);
const mkCode=()=>Math.random().toString(36).slice(2,8).toUpperCase();
const now=()=>new Date().toLocaleString('en-IN');
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const DB={g:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},s:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),d:k=>localStorage.removeItem(k),ks:p=>Object.keys(localStorage).filter(k=>k.startsWith(p))};

// ═══ ROLE CONFIG ═══
const ROLES={
  admin:   {label:'Admin',      icon:'👑', color:'#f0a500', desc:'Sab kuch access'},
  manager: {label:'Manager',    icon:'🏆', color:'#3b82f6', desc:'Sales, Inventory, Housekeeping'},
  staff:   {label:'Staff',      icon:'🙋', color:'#22c55e', desc:'Sales record karna'},
  agent:   {label:'Agent',      icon:'🤝', color:'#a855f7', desc:'Order lena, stock dekhna'},
  distributor:{label:'Distributor',icon:'🚚',color:'#14b8a6',desc:'Order lena, stock dekhna'},
};

// PERMISSIONS per role
const PERMS={
  admin:      {dashboard:1,share:1,mychain:1,staff:1,products:1,productsEdit:1,orders:1,roles:1,settings:1,ai:1,pricing:'all'},
  manager:    {dashboard:1,products:1,productsEdit:0,orders:1,ai:1,pricing:'retail'},
  staff:      {dashboard:1,orders:1,pricing:'retail'},
  agent:      {dashboard:1,products:1,productsEdit:0,orders:1,pricing:'wholesale'},
  distributor:{dashboard:1,products:1,productsEdit:0,orders:1,pricing:'distributor'},
};

// What price tier each role sees for orders
const ROLE_TIER={admin:'retail',manager:'retail',staff:'retail',agent:'wholesale',distributor:'distributor'};
const TIER_LABEL={retail:'🏷️ Retail',wholesale:'🔵 Wholesale',distributor:'🟣 Distributor'};
const TIER_KEY={retail:'price',wholesale:'priceW',distributor:'priceD'};

// ═══ STATE ═══
const SUPER={u:'superadmin',p:'super@123'};
let CU=null,CS=null,TAB='dashboard';

// ═══ TOAST ═══
let _tt;
function toast(msg,t){const el=$('tst');el.textContent=msg;el.style.color=t==='err'?'#ef4444':'#22c55e';el.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('on'),2600)}

// ═══ MODAL ═══
function oMo(tl,html){$('MT').textContent=tl;$('MB').innerHTML=html;$('MO').classList.add('open')}
function cMo(){$('MO').classList.remove('open')}
$('MO').addEventListener('click',e=>{if(e.target===$('MO'))cMo()});

// ═══ URL REF ═══
function pageURL(){return window.location.origin+window.location.pathname}
function refLink(shop){return pageURL()+'?ref='+shop.refCode}
(function(){
  const ref=new URLSearchParams(window.location.search).get('ref');
  if(!ref)return;
  setTimeout(()=>{const inp=$('RC');if(inp){inp.value=ref.toUpperCase();chkRef()}const rb=$('refBanner');if(rb)rb.style.display=''},100);
})();

function chkRef(){
  const code=($('RC')||{}).value.trim().toUpperCase(),info=$('RC_info');if(!info)return;
  if(!code){info.textContent='';return}
  const found=DB.ks('shop:').map(k=>DB.g(k)).filter(Boolean).find(s=>s.refCode===code);
  info.textContent=found?'✅ Dukan: '+found.shopName+' ('+found.ownerName+')':'❌ Code sahi nahi';
  info.style.color=found?'#22c55e':'#ef4444';
  if(found){const b=$('refBanner'),bn=$('refBannerName');if(b){b.style.display='';if(bn)bn.textContent=found.shopName+' — '+found.ownerName}}
}

// ═══ LOGIN ═══
function login(){
  const u=$('LU').value.trim(),p=$('LP').value,err=$('LE');
  if(!u||!p){err.innerHTML='<div class="ae">❌ Username aur password daalo!</div>';return}
  if(u===SUPER.u&&p===SUPER.p){CU={role:'superadmin',username:u};err.innerHTML='';startApp();return}
  for(const k of DB.ks('shop:')){
    const s=DB.g(k);if(!s)continue;
    if(s.username===u&&s.password===p){CU={...s,shopRole:'admin',role:'owner'};CS=s;err.innerHTML='';startApp();return}
    const m=(s.staff||[]).find(x=>x.username===u&&x.password===p);
    if(m){CU={...
